# Semsage Development Environment
#
# Usage:
#   docker compose up -d      # Start all services
#   docker compose down        # Stop all services
#   docker compose up nats -d  # Start NATS only (for local dev)

services:
  nats:
    image: nats:2.10-alpine
    container_name: semsage-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      ["-js", "-sd", "/data", "-m", "8222", "--name", "semsage-nats"]
    volumes:
      - nats-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  semsage:
    build: .
    container_name: semsage-api
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    expose:
      - "8090"

  caddy:
    image: caddy:2-alpine
    container_name: semsage-caddy
    depends_on:
      - semsage
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./ui/build:/srv/ui:ro

volumes:
  nats-data:
